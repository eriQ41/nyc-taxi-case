# Databricks Asset Bundle — versions the pipeline Job as code (Lakeflow Jobs).
#
# Deploy:  databricks bundle deploy -t dev
# Run:     databricks bundle run nyc_taxi_pipeline -t dev
#
# Reproducibility: a consumer changes only the workspace `host` below and
# authenticates the Databricks CLI with their own PAT. Everything else — the
# catalog/schema/volume and the tables — is created by the notebooks themselves.
#
# Prerequisite: the landing Volume must already be populated (see README:
# `python src/download_landing_local.py --upload`). The Job runs the processing
# pipeline; it does not download data (serverless has no internet).

bundle:
  name: nyc-taxi-case

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-45f08088-dda3.cloud.databricks.com

resources:
  jobs:
    nyc_taxi_pipeline:
      name: nyc_taxi_pipeline
      # Each task runs a notebook on serverless compute, in order. The notebooks
      # read the previous layer's output table — they do not re-run earlier steps.
      tasks:
        - task_key: setup_config
          notebook_task:
            notebook_path: ./src/00_config.py
        - task_key: validate_landing
          depends_on:
            - task_key: setup_config
          notebook_task:
            notebook_path: ./src/01_ingest_landing.py
        - task_key: bronze
          depends_on:
            - task_key: validate_landing
          notebook_task:
            notebook_path: ./src/02_bronze.py
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./src/03_silver.py
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./src/04_gold.py
